<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FishingSpot - Fishing Tracker PWA</title>
    <meta name="description" content="Track your fishing catches with location, photos, and statistics" />
    <meta name="theme-color" content="#0EA5E9" />
    <base href="/FishingSpot_App/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="AppIcon.svg" />
    <link rel="icon" type="image/png" href="icon-512.png" />
    <link href="FishingSpot.PWA.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <script type="importmap"></script>

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafgraph/spa-github-pages
        // This script checks to see if a redirect is present in the query string,
        // converts it back into the correct url and adds it to the
        // browser's history using window.history.replaceState(...),
        // which won't cause the browser to attempt to load the new url.
        // When the single page app is loaded further down in this file,
        // the correct url will be waiting in the browser's history for
        // the single page app to route accordingly.
        (function(l) {
            if (l.search[1] === '/' ) {
                var decoded = l.search.slice(1).split('&').map(function(s) { 
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>

    <script>
        // ==========================================
        // GEOLOCALISATION
        // ==========================================
        window.getCurrentPosition = function() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error("La géolocalisation n'est pas supportée par votre navigateur"));
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            latitude: position.coords.latitude.toFixed(6),
                            longitude: position.coords.longitude.toFixed(6),
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        reject(new Error(error.message));
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });
        };

        // ==========================================
        // REVERSE GEOCODING - Obtenir le nom du lieu
        // ==========================================
        window.reverseGeocode = async function(latitude, longitude) {
            try {
                // Utiliser l'API Nominatim d'OpenStreetMap (gratuite et sans clé API)
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=14&addressdetails=1`,
                    {
                        headers: {
                            'Accept-Language': 'fr' // Préférer les résultats en français
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error('Erreur de géocodage');
                }

                const data = await response.json();

                // Construire un nom de lieu lisible
                const address = data.address;
                let locationName = '';

                // Priorité : plan d'eau > ville > village > commune
                if (address.water) {
                    locationName = address.water;
                } else if (address.lake) {
                    locationName = address.lake;
                } else if (address.river) {
                    locationName = address.river;
                } else if (address.city) {
                    locationName = address.city;
                } else if (address.town) {
                    locationName = address.town;
                } else if (address.village) {
                    locationName = address.village;
                } else if (address.municipality) {
                    locationName = address.municipality;
                }

                // Ajouter le pays si disponible
                if (address.country && locationName) {
                    locationName += `, ${address.country}`;
                } else if (address.country) {
                    locationName = address.country;
                }

                return locationName || data.display_name;
            } catch (error) {
                console.error('Erreur reverse geocoding:', error);
                return null;
            }
        };

        // ==========================================
        // CAMERA - Méthode améliorée pour mobile
        // ==========================================
        window.openCamera = async function() {
            try {
                // Essayer d'utiliser l'API MediaStream (getUserMedia) pour un contrôle plus direct
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment' // Caméra arrière
                    } 
                });

                // Créer un élément vidéo temporaire
                const video = document.createElement('video');
                video.srcObject = stream;
                video.style.position = 'fixed';
                video.style.top = '0';
                video.style.left = '0';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.zIndex = '9999';
                video.style.backgroundColor = 'black';
                video.autoplay = true;
                video.playsInline = true;

                // Ajouter un bouton de capture
                const captureBtn = document.createElement('button');
                captureBtn.innerHTML = '📷 Capturer';
                captureBtn.style.position = 'fixed';
                captureBtn.style.bottom = '20px';
                captureBtn.style.left = '50%';
                captureBtn.style.transform = 'translateX(-50%)';
                captureBtn.style.zIndex = '10000';
                captureBtn.style.padding = '15px 30px';
                captureBtn.style.fontSize = '18px';
                captureBtn.style.backgroundColor = '#007bff';
                captureBtn.style.color = 'white';
                captureBtn.style.border = 'none';
                captureBtn.style.borderRadius = '50px';
                captureBtn.style.cursor = 'pointer';

                // Ajouter un bouton annuler
                const cancelBtn = document.createElement('button');
                cancelBtn.innerHTML = '❌ Annuler';
                cancelBtn.style.position = 'fixed';
                cancelBtn.style.top = '20px';
                cancelBtn.style.right = '20px';
                cancelBtn.style.zIndex = '10000';
                cancelBtn.style.padding = '10px 20px';
                cancelBtn.style.fontSize = '16px';
                cancelBtn.style.backgroundColor = '#dc3545';
                cancelBtn.style.color = 'white';
                cancelBtn.style.border = 'none';
                cancelBtn.style.borderRadius = '25px';
                cancelBtn.style.cursor = 'pointer';

                document.body.appendChild(video);
                document.body.appendChild(captureBtn);
                document.body.appendChild(cancelBtn);

                return new Promise((resolve, reject) => {
                    captureBtn.onclick = () => {
                        // Capturer l'image depuis la vidéo
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0);

                        // Convertir en blob
                        canvas.toBlob((blob) => {
                            // Nettoyer
                            stream.getTracks().forEach(track => track.stop());
                            document.body.removeChild(video);
                            document.body.removeChild(captureBtn);
                            document.body.removeChild(cancelBtn);

                            resolve(blob);
                        }, 'image/jpeg', 0.95);
                    };

                    cancelBtn.onclick = () => {
                        stream.getTracks().forEach(track => track.stop());
                        document.body.removeChild(video);
                        document.body.removeChild(captureBtn);
                        document.body.removeChild(cancelBtn);
                        reject(new Error('Capture annulée'));
                    };
                });
            } catch (error) {
                console.error('Erreur camera:', error);
                // Fallback vers input file avec capture
                return null;
            }
        };

        // ==========================================
        // UPLOAD PHOTO depuis input file caméra
        // ==========================================
        window.uploadPhotoFromCamera = async function(inputId, dotNetHelper) {
            const input = document.getElementById(inputId);
            if (!input || !input.files || input.files.length === 0) {
                return;
            }

            const file = input.files[0];

            // Lire le fichier en tant que ArrayBuffer
            const reader = new FileReader();
            reader.onload = async function(e) {
                const arrayBuffer = e.target.result;
                const byteArray = new Uint8Array(arrayBuffer);

                // Appeler la méthode C# avec le fichier converti en byte[]
                await dotNetHelper.invokeMethodAsync('HandleCameraPhotoUpload', file.name, Array.from(byteArray));
            };

            reader.readAsArrayBuffer(file);
        };

        // ==========================================
        // UPLOAD PHOTO depuis blob (getUserMedia)
        // ==========================================
        window.uploadPhotoBlob = async function(blob, dotNetHelper) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                const arrayBuffer = e.target.result;
                const byteArray = new Uint8Array(arrayBuffer);
                const fileName = `photo_${Date.now()}.jpg`;

                await dotNetHelper.invokeMethodAsync('HandleCameraPhotoUpload', fileName, Array.from(byteArray));
            };

            reader.readAsArrayBuffer(blob);
        };

        // ==========================================
        // NOTIFICATION SESSION EXPIRÉE
        // ==========================================
        window.showSessionExpiredNotification = function() {
            // Créer une notification élégante
            const notification = document.createElement('div');
            notification.innerHTML = `
                <div style="
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: white;
                    padding: 30px;
                    border-radius: 15px;
                    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
                    z-index: 10000;
                    max-width: 400px;
                    text-align: center;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                ">
                    <div style="font-size: 60px; margin-bottom: 20px;">⚠️</div>
                    <h2 style="margin: 0 0 15px 0; color: #ef476f; font-size: 24px;">Session expirée</h2>
                    <p style="margin: 0 0 25px 0; color: #666; font-size: 16px; line-height: 1.5;">
                        Votre session a expiré pour des raisons de sécurité.<br>
                        Veuillez vous reconnecter pour continuer.
                    </p>
                    <button onclick="window.location.href='/FishingSpot_App/login'" style="
                        background: #0066cc;
                        color: white;
                        border: none;
                        padding: 15px 40px;
                        border-radius: 50px;
                        font-size: 16px;
                        font-weight: 600;
                        cursor: pointer;
                        box-shadow: 0 4px 15px rgba(0,102,204,0.3);
                    ">
                        🔑 Se reconnecter
                    </button>
                </div>
            `;

            // Backdrop semi-transparent
            const backdrop = document.createElement('div');
            backdrop.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 9999;
            `;

            document.body.appendChild(backdrop);
            document.body.appendChild(notification);

            // Redirection automatique après 10 secondes
            setTimeout(() => {
                window.location.href = '/FishingSpot_App/login';
            }, 10000);
        };
    </script>
</body>

</html>
