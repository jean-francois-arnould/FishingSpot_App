name: Build iOS pour AltStore

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install .NET MAUI Workload
      run: |
        dotnet workload install maui --source https://api.nuget.org/v3/index.json

    - name: Restore dependencies
      run: dotnet restore FishingSpot/FishingSpot.csproj

    - name: Import Certificate
      env:
        CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      run: |
        # Créer un keychain temporaire
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

        # Créer le keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # Importer le certificat
        echo $CERTIFICATE_BASE64 | base64 --decode > certificate.p12
        security import certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        rm certificate.p12

    - name: Import Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo $PROVISIONING_PROFILE_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

    - name: Set Version
      run: |
        VERSION="${{ github.event.inputs.version || '1.0.0' }}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV

        # Mettre à jour le .csproj avec la version
        sed -i '' "s/<ApplicationDisplayVersion>.*<\/ApplicationDisplayVersion>/<ApplicationDisplayVersion>$VERSION<\/ApplicationDisplayVersion>/" FishingSpot/FishingSpot.csproj

    - name: Build iOS App
      run: |
        dotnet publish FishingSpot/FishingSpot.csproj \
          -c Release \
          -f net10.0-ios \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:ArchiveOnBuild=true \
          -p:CreatePackage=true \
          -p:CodesignKey="iPhone Distribution" \
          -p:CodesignProvision="FishingSpot Distribution"

    - name: Find IPA
      id: find_ipa
      run: |
        IPA_PATH=$(find FishingSpot/bin/Release/net10.0-ios/ios-arm64 -name "*.ipa" | head -n 1)
        echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV

        if [ -f "$IPA_PATH" ]; then
          FILE_SIZE=$(stat -f%z "$IPA_PATH")
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "✅ IPA trouvé: $IPA_PATH (Taille: $FILE_SIZE bytes)"
        else
          echo "❌ Aucun fichier IPA trouvé"
          exit 1
        fi

    - name: Rename IPA
      run: |
        VERSION="${{ env.VERSION }}"
        NEW_NAME="FishingSpot-${VERSION}.ipa"
        mkdir -p publish/ios
        cp "${{ env.IPA_PATH }}" "publish/ios/$NEW_NAME"
        echo "IPA_NAME=$NEW_NAME" >> $GITHUB_ENV

    - name: Update AltStore Source
      run: |
        VERSION="${{ env.VERSION }}"
        FILE_SIZE="${{ env.FILE_SIZE }}"
        DATE=$(date +%Y-%m-%d)

        # Mettre à jour le JSON avec la nouvelle version
        python3 << EOF
        import json

        with open('altstore-source.json', 'r') as f:
            data = json.load(f)

        new_version = {
            "version": "$VERSION",
            "date": "$DATE",
            "localizedDescription": "Mise à jour automatique depuis GitHub Actions",
            "downloadURL": "https://jean-francois-arnould.github.io/FishingSpot_App/publish/ios/${{ env.IPA_NAME }}",
            "size": int("$FILE_SIZE"),
            "minOSVersion": "15.0"
        }

        # Ajouter la nouvelle version en premier
        data['apps'][0]['versions'].insert(0, new_version)

        # Garder seulement les 5 dernières versions
        data['apps'][0]['versions'] = data['apps'][0]['versions'][:5]

        with open('altstore-source.json', 'w') as f:
            json.dump(data, f, indent=2)

        print(f"✅ Version {new_version['version']} ajoutée à altstore-source.json")
        EOF

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FishingSpot-iOS-${{ env.VERSION }}
        path: publish/ios/${{ env.IPA_NAME }}
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: publish/ios/${{ env.IPA_NAME }}
        body: |
          ## 🎣 FishingSpot ${{ env.VERSION }}

          ### Installation via AltStore
          Ajoutez cette source : `https://jean-francois-arnould.github.io/FishingSpot_App/altstore-source.json`

          ### Téléchargement direct
          Fichier IPA disponible en pièce jointe.

          ### Taille
          ${{ env.FILE_SIZE }} bytes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit AltStore Source
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add altstore-source.json
        git commit -m "🚀 Update AltStore source to v${{ env.VERSION }}" || echo "No changes"
        git push || echo "Nothing to push"
