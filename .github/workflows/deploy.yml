name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, WAP ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore FishingSpot.PWA/FishingSpot.PWA.csproj

      - name: Build
        run: dotnet build FishingSpot.PWA/FishingSpot.PWA.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish FishingSpot.PWA/FishingSpot.PWA.csproj -c Release -o release --nologo

      # Change base-tag in index.html from '/' to 'FishingSpot_App' to match GitHub repository name
      - name: Change base-tag in index.html
        run: sed -i 's/<base href="\/" \/>/<base href="\/FishingSpot_App\/" \/>/g' release/wwwroot/index.html

      # Copy 404.html for SPA routing
      - name: Copy 404.html for GitHub Pages SPA routing
        run: cp release/wwwroot/404.html release/wwwroot/404.html || echo "404.html already exists"

      # Add .nojekyll file to tell GitHub pages to not treat this as a Jekyll project
      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'release/wwwroot'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
