name: Deploy Blazor to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Create appsettings.json with Supabase secrets
        run: |
          cat > wwwroot/appsettings.json << EOF
          {
            "Supabase": {
              "Url": "${{ secrets.SUPABASE_URL }}",
              "Key": "${{ secrets.SUPABASE_KEY }}"
            }
          }
          EOF

      - name: Publish
        run: dotnet publish FishingSpot.PWA.csproj -c Release -o output --nologo

      - name: Copy 404.html for SPA routing
        run: cp 404.html output/wwwroot/404.html

      - name: Fix base href for GitHub Pages (needed for _framework assets)
        run: sed -i 's/<base href="\/" \/>/<base href="\/FishingSpot_App\/" \/>/g' output/wwwroot/index.html

      - name: Fix manifest for PWA
        run: |
          sed -i 's/"id": "\.\/",/"id": "\/FishingSpot_App\/",/g' output/wwwroot/manifest.webmanifest
          sed -i 's/"start_url": "\.\/",/"start_url": "\/FishingSpot_App\/",/g' output/wwwroot/manifest.webmanifest

      - name: Fix service worker base path
        run: sed -i 's/const base = "\/";/const base = "\/FishingSpot_App\/";/g' output/wwwroot/service-worker.js

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4
        continue-on-error: true
        timeout-minutes: 5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot
        timeout-minutes: 10

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 10
        continue-on-error: false
