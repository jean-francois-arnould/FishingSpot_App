name: Deploy Blazor to GitHub Pages

on:
  push:
    branches: [ WAP, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish
        run: dotnet publish -c Release -o output --nologo

      - name: Fix base href for GitHub Pages
        run: sed -i 's/<base href="\/" \/>/<base href="\/FishingSpot_App\/" \/>/g' output/wwwroot/index.html

      - name: Fix manifest for PWA
        run: |
          sed -i 's/"id": "\.\/",/"id": "\/FishingSpot_App\/",/g' output/wwwroot/manifest.webmanifest
          sed -i 's/"start_url": "\.\/",/"start_url": "\/FishingSpot_App\/",/g' output/wwwroot/manifest.webmanifest

      - name: Add 404.html for SPA routing
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
