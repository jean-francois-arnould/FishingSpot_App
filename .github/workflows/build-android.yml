name: Build Android APK

on:
  push:
    branches: [ master ]
    paths:
      - 'FishingSpot/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install .NET MAUI Workload
      run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

    - name: Restore dependencies
      run: dotnet restore FishingSpot/FishingSpot.csproj

    - name: Setup Keystore
      run: |
        $KeystoreContent = "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
        if ($KeystoreContent) {
          [System.Convert]::FromBase64String($KeystoreContent) | Set-Content -Path "fishingspot.keystore" -Encoding Byte
          Write-Host "✅ Keystore décodé"
        } else {
          Write-Host "⚠️ Pas de keystore - Build non signé"
        }
      shell: pwsh

    - name: Set Version
      run: |
        $Version = "${{ github.event.inputs.version }}"
        if (-not $Version) { $Version = "1.0.${{ github.run_number }}" }
        echo "VERSION=$Version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        # Mettre à jour le .csproj
        $csproj = Get-Content "FishingSpot/FishingSpot.csproj"
        $csproj = $csproj -replace '<ApplicationDisplayVersion>.*</ApplicationDisplayVersion>', "<ApplicationDisplayVersion>$Version</ApplicationDisplayVersion>"
        $csproj = $csproj -replace '<ApplicationVersion>.*</ApplicationVersion>', "<ApplicationVersion>${{ github.run_number }}</ApplicationVersion>"
        $csproj | Set-Content "FishingSpot/FishingSpot.csproj"
      shell: pwsh

    - name: Build Android APK (Signed)
      if: secrets.ANDROID_KEYSTORE_BASE64 != ''
      run: |
        dotnet publish FishingSpot/FishingSpot.csproj `
          -c Release `
          -f net10.0-android `
          -p:AndroidPackageFormat=apk `
          -p:AndroidKeyStore=true `
          -p:AndroidSigningKeyStore="fishingspot.keystore" `
          -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
          -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
          -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}"
      shell: pwsh

    - name: Build Android APK (Unsigned)
      if: secrets.ANDROID_KEYSTORE_BASE64 == ''
      run: |
        dotnet publish FishingSpot/FishingSpot.csproj `
          -c Release `
          -f net10.0-android `
          -p:AndroidPackageFormat=apk
      shell: pwsh

    - name: Find and Rename APK
      id: find_apk
      run: |
        $ApkPath = Get-ChildItem -Path "FishingSpot/bin/Release/net10.0-android" -Filter "*.apk" -Recurse | Select-Object -First 1

        if ($ApkPath) {
          $Version = $env:VERSION
          $NewName = "FishingSpot-${Version}.apk"
          $OutputDir = "publish/android"
          New-Item -ItemType Directory -Path $OutputDir -Force | Out-Null
          Copy-Item -Path $ApkPath.FullName -Destination "$OutputDir/$NewName"

          $FileSize = (Get-Item "$OutputDir/$NewName").Length
          $FileSizeMB = [math]::Round($FileSize / 1MB, 2)

          echo "APK_PATH=$OutputDir/$NewName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "APK_NAME=$NewName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "FILE_SIZE=$FileSize" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "✅ APK trouvé et renommé: $NewName (Taille: $FileSizeMB MB)"
        } else {
          Write-Host "❌ Aucun fichier APK trouvé"
          exit 1
        }
      shell: pwsh

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FishingSpot-Android-${{ env.VERSION }}
        path: ${{ env.APK_PATH }}
        retention-days: 90

    - name: Create Release
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION }}
        name: FishingSpot v${{ env.VERSION }} - Android
        files: ${{ env.APK_PATH }}
        body: |
          ## 🎣 FishingSpot v${{ env.VERSION }} - Android

          ### 📥 Installation
          1. Téléchargez le fichier APK
          2. Sur votre téléphone Android, activez "Sources inconnues" dans les paramètres
          3. Ouvrez le fichier APK pour installer l'application

          ### ✨ Fonctionnalités
          - ✅ Enregistrement des captures avec photo et GPS
          - ✅ Météo en temps réel
          - ✅ Statistiques et graphiques
          - ✅ Export PDF/CSV
          - ✅ Calendrier de pêche
          - ✅ Gestion de matériel
          - ✅ Mode hors ligne complet

          ### 📊 Informations
          - **Taille**: ${{ env.FILE_SIZE }} bytes
          - **Version Android minimale**: 5.0 (API 21)
          - **Architectures**: ARM64, ARM, x86_64

          ### 🔒 Sécurité
          APK signé avec certificat de développement.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ✅ Build Android réussi !

            📦 **APK disponible** dans les artifacts de cette exécution
            📱 **Version**: ${{ env.VERSION }}
            📊 **Taille**: ${{ env.FILE_SIZE }} bytes

            [Télécharger les artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
          })
