name: Deploy Blazor WASM to GitHub Pages

# Déclenche le workflow sur push vers les branches main ou WAP, ou manuellement
on:
  push:
    branches: [ main, WAP ]
  workflow_dispatch:

# Permissions nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Empêche les déploiements concurrents
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout du code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installation de .NET 10
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # 3. Restauration des dépendances
      - name: Restore dependencies
        run: dotnet restore FishingSpot.PWA/FishingSpot.PWA.csproj

      # 4. Build du projet
      - name: Build project
        run: dotnet build FishingSpot.PWA/FishingSpot.PWA.csproj -c Release --no-restore

      # 5. Publication du projet
      - name: Publish project
        run: dotnet publish FishingSpot.PWA/FishingSpot.PWA.csproj -c Release -o release --nologo

      # 6. Modification du base href pour GitHub Pages
      - name: Update base href for GitHub Pages
        run: sed -i 's/<base href="\/" \/>/<base href="\/FishingSpot_App\/" \/>/g' release/wwwroot/index.html

      # 7. Modification du manifest PWA pour GitHub Pages
      - name: Update PWA manifest for GitHub Pages
        run: |
          sed -i 's/"id": "\.\/",/"id": "\/FishingSpot_App\/",/g' release/wwwroot/manifest.webmanifest
          sed -i 's/"start_url": "\.\/",/"start_url": "\/FishingSpot_App\/",/g' release/wwwroot/manifest.webmanifest

      # 8. Copie de index.html vers 404.html pour le routage SPA
      - name: Copy index.html to 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # 9. Ajout du fichier .nojekyll pour désactiver Jekyll
      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      # 10. Configuration de GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # 11. Upload des fichiers publiés
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'release/wwwroot'

      # 12. Déploiement sur GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
