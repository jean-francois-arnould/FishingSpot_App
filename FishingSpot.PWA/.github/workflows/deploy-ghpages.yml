name: Deploy to GitHub Pages

on:
  push:
    branches: [ WAP, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore FishingSpot.PWA/FishingSpot.PWA.csproj

      - name: Build
        run: dotnet build FishingSpot.PWA/FishingSpot.PWA.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish FishingSpot.PWA/FishingSpot.PWA.csproj -c Release -o release --nologo

      - name: Change base-tag in index.html for GitHub Pages
        run: sed -i 's/<base href="\/" \/>/<base href="\/FishingSpot_App\/" \/>/g' release/wwwroot/index.html

      - name: Update manifest for GitHub Pages
        run: |
          sed -i 's/"id": "\.\/",/"id": "\/FishingSpot_App\/",/g' release/wwwroot/manifest.webmanifest
          sed -i 's/"start_url": "\.\/",/"start_url": "\/FishingSpot_App\/",/g' release/wwwroot/manifest.webmanifest

      - name: Copy index.html to 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'release/wwwroot'

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
